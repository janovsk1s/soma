name: CI

on:
  push:
    branches: [main, test]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests and network guard
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Verify no outbound HTTP client dependencies
        run: ./gradlew verifyNoHttpClients --console=plain

      - name: Run unit tests
        run: >-
          ./gradlew --console=plain
          :core:test
          :lanserver:test
          :storage:testDebugUnitTest
          :voice:testDebugUnitTest
          :media:testDebugUnitTest
          :whisper:testDebugUnitTest
          :app:testBrowserDebugUnitTest
          :app:testCloudDebugUnitTest
          :app:testPuristDebugUnitTest

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          retention-days: 7

  release-gates:
    name: Lint and assembly gates
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Lint every flavor's release variant
        run: >-
          ./gradlew --console=plain
          :app:lintBrowserRelease
          :app:lintCloudRelease
          :app:lintPuristRelease

      - name: Assemble debug, preview, and release for every flavor
        run: ./gradlew --console=plain :app:assembleDebug :app:assemblePreview :app:assembleRelease

      - name: Upload lint reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: app/build/reports/lint-results-*.html
          retention-days: 7
